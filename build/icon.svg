<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1b26"/>
  <!-- stacked slicing layers forming a cube -->
  <g transform="translate(256 300)">
    <!-- bottom to top isometric layers -->
    <g stroke="#1a1b26" stroke-width="4" stroke-linejoin="round">
      <polygon points="0,60 120,0 0,-60 -120,0" fill="#3b4261"/>
      <polygon points="0,20 120,-40 0,-100 -120,-40" fill="#565f89"/>
      <polygon points="0,-20 120,-80 0,-140 -120,-80" fill="#7aa2f7"/>
      <polygon points="0,-60 120,-120 0,-180 -120,-120" fill="#bb9af7"/>
    </g>
  </g>
  <!-- AI spark -->
  <g transform="translate(360 150)" fill="#9ece6a">
    <path d="M0,-34 L9,-9 L34,0 L9,9 L0,34 L-9,9 L-34,0 L-9,-9 Z"/>
  </g>
  <text x="256" y="440" font-family="sans-serif" font-size="72" font-weight="700"
        text-anchor="middle" fill="#c0caf5">AI Slice</text>
</svg>
